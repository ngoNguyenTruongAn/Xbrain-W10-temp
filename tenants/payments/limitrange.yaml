---
# LimitRange cho namespace payments
# Cung cấp default limits cho pod không khai báo
apiVersion: v1
kind: LimitRange
metadata:
  name: payments-limitrange
  namespace: payments
spec:
  limits:
    # Container limits
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2"
        memory: "2Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    
    # Pod limits (tổng các container)
    - type: Pod
      max:
        cpu: "4"
        memory: "4Gi"
