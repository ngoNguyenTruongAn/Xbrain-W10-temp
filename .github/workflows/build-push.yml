# Build, scan, push and sign Docker image to GitHub Container Registry
name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - 'app-api/rollout.yaml'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/w10-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image names must be lowercase.
      # Example: ghcr.io/ngonguyentruongan/w10-api
      - name: Normalize image name
        id: image
        run: |
          IMAGE_REPO=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=$IMAGE_REPO" >> $GITHUB_OUTPUT
          echo "IMAGE_REPO=$IMAGE_REPO"

      - name: Extract metadata tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.repo }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.semver.outputs.version }}
            type=sha,prefix=v${{ steps.semver.outputs.version }}-

      - name: Build Docker image locally
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.repo }}:${{ steps.semver.outputs.version }}
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@main

      - name: Sign image with Cosign
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            ${{ steps.image.outputs.repo }}:${{ steps.semver.outputs.version }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Verify image signature
        run: |
          cosign verify --key signing/cosign.pub \
            ${{ steps.image.outputs.repo }}:${{ steps.semver.outputs.version }}

      - name: Update rollout.yaml with new version
        run: |
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${{ steps.image.outputs.repo }}:${{ steps.semver.outputs.version }}|g" app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" app-api/rollout.yaml

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to v${{ steps.semver.outputs.version }}"
            git push
          fi

      - name: Create git tag
        run: |
          if git rev-parse "v${{ steps.semver.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.semver.outputs.version }} already exists"
          else
            git tag v${{ steps.semver.outputs.version }}
            git push origin v${{ steps.semver.outputs.version }}
          fi

